[project]
name = "anduril-sim"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "keyboard>=0.13.5",
    "matplotlib>=3.10.9",
    "numpy>=2.4.6",
    "opencv-python>=4.13.0.92",
    "pymavlink>=2.4.49",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "lefthook>=2.1.9",
    "pytest>=8.0.0",
    "ruff>=0.15.15",
]
# RL training/deploy deps. Kept out of the default install so `make sim` and the bare
# pilot need no heavy ML wheels. Install with:  uv sync --group rl
rl = [
    "torch>=2.2.0",
    "stable-baselines3>=2.3.0",
    "gymnasium>=0.29.0",
]
