[project]
name = "anduril-sim"
version = "0.1.0"
description = "Autonomous AI Grand Prix drone racing pilot for FlightSim.exe"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "numpy>=2.4.6",
    "opencv-python>=4.13.0.92",
    "pymavlink>=2.4.49",
]

[dependency-groups]
dev = [
    "lefthook>=2.1.9",
    "pytest>=8.4.0",
    "ruff>=0.15.15",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
